name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ./website/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run validate:build

  lint-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --root-dir ./website/static
            --timeout 30
            --max-retries 3
            --retry-wait-time 5
            --exclude 'https://shields.io'
            --exclude 'https://camo.githubusercontent.com'
            --exclude 'https://literacy-for-kids.github.io'
            --exclude 'https://www.bbc.co.uk'
            --exclude 'https://www.kidrex.org'
            --exclude 'https://www.kiddle.co'
            --exclude 'https://www.3dslash.net'
            --exclude 'https://www.blockscad3d.com'
            --exclude 'https://www.nitrotype.com'
            --exclude 'https://chat.openai.com'
            --exclude 'https://onedrive.live.com'
            --exclude 'https://www.canva.com'
            --exclude 'https://docs.google.com'
            --exclude 'https://drive.google.com'
            --exclude 'https://gemini.google.com'
            --exclude 'https://copilot.microsoft.com'
            --exclude 'https://www.tinkercad.com'
            './README.md'
            './website/docs/**/*.md'
          fail: true
