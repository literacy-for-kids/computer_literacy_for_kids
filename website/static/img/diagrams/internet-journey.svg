<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ijTitle">
  <title id="ijTitle">How a web page reaches you: your device sends a request through your home router across the internet to a server far away, and the page travels all the way back in a fraction of a second</title>
  <defs>
    <marker id="ijA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a90d9"/>
    </marker>
    <marker id="ijB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="858" height="418" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="430" y="40" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">How a Web Page Reaches You</text>

  <!-- you + device -->
  <g font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(120 200)">
      <rect x="-55" y="-40" width="110" height="72" rx="8" fill="#4a90d9"/>
      <rect x="-45" y="-30" width="90" height="52" rx="4" fill="#dbeafe"/>
      <rect x="-18" y="32" width="36" height="8" rx="4" fill="#4a90d9"/>
      <text y="72" font-size="14.5" font-weight="700" fill="#1e293b">YOUR DEVICE</text>
      <text y="92" font-size="12" fill="#64748b">&#8220;show me the dinosaur page!&#8221;</text>
    </g>
    <!-- router -->
    <g transform="translate(330 200)">
      <rect x="-50" y="-16" width="100" height="42" rx="10" fill="#93c5fd"/>
      <line x1="-28" y1="-16" x2="-38" y2="-52" stroke="#4a90d9" stroke-width="4" stroke-linecap="round"/>
      <line x1="28" y1="-16" x2="38" y2="-52" stroke="#4a90d9" stroke-width="4" stroke-linecap="round"/>
      <circle cx="-20" cy="6" r="4" fill="#1e3a8a"/><circle cx="0" cy="6" r="4" fill="#1e3a8a"/><circle cx="20" cy="6" r="4" fill="#1e3a8a"/>
      <text y="66" font-size="14.5" font-weight="700" fill="#1e293b">YOUR ROUTER</text>
      <text y="86" font-size="12" fill="#64748b">sends it out of the house</text>
    </g>
    <!-- internet cloud -->
    <g transform="translate(552 190)">
      <g fill="#dbeafe" stroke="#4a90d9" stroke-width="2.5">
        <ellipse cx="0" cy="0" rx="78" ry="38"/>
        <ellipse cx="-45" cy="12" rx="38" ry="24"/>
        <ellipse cx="48" cy="14" rx="34" ry="22"/>
      </g>
      <text y="6" font-size="14.5" font-weight="700" fill="#1e3a8a">THE INTERNET</text>
      <text y="80" font-size="12" fill="#64748b">many computers passing the</text>
      <text y="97" font-size="12" fill="#64748b">message along, hop by hop</text>
    </g>
    <!-- server -->
    <g transform="translate(760 200)">
      <rect x="-40" y="-52" width="80" height="30" rx="6" fill="#4a90d9"/>
      <rect x="-40" y="-16" width="80" height="30" rx="6" fill="#4a90d9"/>
      <rect x="-40" y="20" width="80" height="30" rx="6" fill="#4a90d9"/>
      <circle cx="-24" cy="-37" r="4" fill="#bbf7d0"/><circle cx="-24" cy="-1" r="4" fill="#bbf7d0"/><circle cx="-24" cy="35" r="4" fill="#bbf7d0"/>
      <text y="76" font-size="14.5" font-weight="700" fill="#1e293b">A SERVER</text>
      <text y="96" font-size="12" fill="#64748b">a computer that stores the page</text>
    </g>
  </g>

  <!-- request arrows (top, blue) -->
  <g stroke="#4a90d9" stroke-width="3">
    <line x1="185" y1="172" x2="270" y2="172" marker-end="url(#ijA)"/>
    <line x1="392" y1="168" x2="465" y2="168" marker-end="url(#ijA)"/>
    <line x1="640" y1="168" x2="708" y2="168" marker-end="url(#ijA)"/>
  </g>
  <text x="430" y="130" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" font-weight="600" fill="#4a90d9">your request travels out &#8594;</text>

  <!-- response arrows (bottom, green) -->
  <g stroke="#16a34a" stroke-width="3">
    <line x1="708" y1="262" x2="640" y2="262" marker-end="url(#ijB)"/>
    <line x1="465" y1="252" x2="392" y2="252" marker-end="url(#ijB)"/>
    <line x1="270" y1="262" x2="185" y2="262" marker-end="url(#ijB)"/>
  </g>
  <text x="430" y="330" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" font-weight="600" fill="#16a34a">&#8592; the page travels all the way back</text>

  <text x="430" y="392" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" fill="#64748b">The whole round trip usually takes less than a second &#8212; even if the server is across the ocean.</text>
</svg>
