<svg viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="cadTitle">
  <title id="cadTitle">From screen to real object: design the model in CAD, export it as an STL file, a slicer cuts it into printable layers, and the 3D printer builds it layer by layer into a real thing</title>
  <defs>
    <marker id="cadA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a90d9"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="858" height="318" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="430" y="40" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">From Screen to Real Object</text>

  <g font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle">
    <g>
      <rect x="45" y="80" width="180" height="150" rx="12" fill="#eff6ff" stroke="#4a90d9" stroke-width="2.5"/>
      <!-- cube on screen -->
      <g transform="translate(135 130)">
        <polygon points="-24,-6 0,-20 24,-6 24,18 0,32 -24,18" fill="#93c5fd" stroke="#1d4ed8" stroke-width="2"/>
        <polyline points="-24,-6 0,8 24,-6" fill="none" stroke="#1d4ed8" stroke-width="2"/>
        <line x1="0" y1="8" x2="0" y2="32" stroke="#1d4ed8" stroke-width="2"/>
      </g>
      <text x="135" y="192" font-size="14.5" font-weight="800" fill="#1e3a8a">1 &#183; DESIGN</text>
      <text x="135" y="212" font-size="12" fill="#64748b">build shapes in TinkerCAD</text>
    </g>
    <g>
      <rect x="255" y="80" width="180" height="150" rx="12" fill="#eff6ff" stroke="#4a90d9" stroke-width="2.5"/>
      <g transform="translate(345 128)">
        <rect x="-30" y="-24" width="60" height="52" rx="6" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
        <text y="8" font-size="13" font-weight="800" fill="#1d4ed8">.STL</text>
      </g>
      <text x="345" y="192" font-size="14.5" font-weight="800" fill="#1e3a8a">2 &#183; EXPORT</text>
      <text x="345" y="212" font-size="12" fill="#64748b">save the model as a file</text>
    </g>
    <g>
      <rect x="465" y="80" width="180" height="150" rx="12" fill="#eff6ff" stroke="#4a90d9" stroke-width="2.5"/>
      <g transform="translate(555 130)" stroke="#1d4ed8" stroke-width="2.5">
        <line x1="-28" y1="-18" x2="28" y2="-18"/>
        <line x1="-28" y1="-6" x2="28" y2="-6"/>
        <line x1="-28" y1="6" x2="28" y2="6"/>
        <line x1="-28" y1="18" x2="28" y2="18"/>
      </g>
      <text x="555" y="192" font-size="14.5" font-weight="800" fill="#1e3a8a">3 &#183; SLICE</text>
      <text x="555" y="212" font-size="12" fill="#64748b">software cuts it into layers</text>
    </g>
    <g>
      <rect x="675" y="80" width="160" height="150" rx="12" fill="#eff6ff" stroke="#4a90d9" stroke-width="2.5"/>
      <g transform="translate(755 130)">
        <rect x="-34" y="-28" width="68" height="10" fill="#1d4ed8"/>
        <line x1="0" y1="-18" x2="0" y2="0" stroke="#1d4ed8" stroke-width="3"/>
        <rect x="-16" y="4" width="32" height="8" fill="#93c5fd"/>
        <rect x="-20" y="12" width="40" height="8" fill="#60a5fa"/>
        <rect x="-24" y="20" width="48" height="8" fill="#3b82f6"/>
      </g>
      <text x="755" y="192" font-size="14.5" font-weight="800" fill="#1e3a8a">4 &#183; PRINT</text>
      <text x="755" y="212" font-size="12" fill="#64748b">built layer by layer</text>
    </g>
  </g>

  <g stroke="#4a90d9" stroke-width="3">
    <line x1="225" y1="155" x2="249" y2="155" marker-end="url(#cadA)"/>
    <line x1="435" y1="155" x2="459" y2="155" marker-end="url(#cadA)"/>
    <line x1="645" y1="155" x2="669" y2="155" marker-end="url(#cadA)"/>
  </g>

  <text x="430" y="278" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" fill="#64748b">No printer? Steps 1 and 2 still count &#8212; your design file is a real, finished thing.</text>
</svg>
